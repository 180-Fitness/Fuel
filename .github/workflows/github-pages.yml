# Builds this Vite app and deploys ./dist to GitHub Pages (frontend-only repo).
#
# Pages URL: https://<org>.github.io/<this-repo-name>/
# vite.config.js production `base` must be "/<this-repo-name>/" (see vite.config.js).
#
# GitHub: Settings → Pages → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
